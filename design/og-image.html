
<!doctype html><html><head><meta charset=utf-8>
<style>
*{margin:0;box-sizing:border-box}
html,body{width:1200px;height:630px;overflow:hidden}
.og{width:1200px;height:630px;position:relative;color:#f3eef7;
  font-family:ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  background:#0c0a10;display:flex;overflow:hidden}
.grad{background:linear-gradient(90deg,#e5557a,#b15cff);-webkit-background-clip:text;background-clip:text;color:transparent}
.mark{font-weight:700;letter-spacing:.01em}
.dot{background:linear-gradient(90deg,#e5557a,#b15cff);-webkit-background-clip:text;background-clip:text;color:transparent}
.pill{display:inline-block;border:1px solid #322b3d;border-radius:999px;padding:8px 18px;color:#a79fb3;font-size:22px;font-weight:600}
.muted{color:#a79fb3}
</style></head><body>
<div class="og" style="flex-direction:column;align-items:center;justify-content:center;text-align:center;background:#0a0810">
  <div class="mark" style="font-size:110px;letter-spacing:-.01em">toward<span class="dot">.love</span></div>
  <div class="muted" style="font-size:30px;margin-top:24px;letter-spacing:.04em">where connection has a chance to bloom</div>
</div></body></html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>toward.love · prompts</title>
    <meta name="robots" content="noindex" />
    <meta name="description" content="Conversation prompts from toward.love." />
    <style>
      :root {
        --bg: #0c0a10;
        --grad1: #1a0f1d;
        --text: #f3eef7;
        --muted: #a79fb3;
        --accent: #e5557a;
        --accent2: #b15cff;
        --card: #16131c;
        --border: #2a2533;
        color-scheme: dark;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        background: radial-gradient(1100px 600px at 50% -10%, var(--grad1), transparent 60%), var(--bg);
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        display: flex;
        flex-direction: column;
        min-height: 100%;
      }
      .grad {
        background: linear-gradient(90deg, var(--accent), var(--accent2));
        -webkit-background-clip: text; background-clip: text; color: transparent;
      }
      .top {
        display: flex; align-items: center; justify-content: space-between;
        padding: 20px 24px; font-weight: 700; letter-spacing: 0.01em;
      }
      .count { color: var(--muted); font-weight: 600; font-size: 14px; }
      .stage {
        flex: 1; display: flex; align-items: center; justify-content: center;
        padding: 24px; text-align: center;
      }
      .slide { max-width: 820px; width: 100%; animation: fade 0.35s ease; }
      @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
      .kicker {
        text-transform: uppercase; letter-spacing: 0.14em; font-size: 13px;
        color: var(--muted); margin-bottom: 22px;
      }
      .q { font-size: clamp(28px, 5vw, 48px); line-height: 1.18; letter-spacing: -0.02em; margin: 0; }
      .progress { display: flex; gap: 8px; justify-content: center; margin-bottom: 26px; }
      .dot { width: 9px; height: 9px; border-radius: 999px; background: var(--border); transition: background 0.2s, transform 0.2s; }
      .dot--on { background: linear-gradient(90deg, var(--accent), var(--accent2)); transform: scale(1.25); }
      .controls {
        display: flex; align-items: center; justify-content: center; gap: 12px;
        padding: 0 24px 40px;
      }
      .btn {
        border: 1px solid transparent; border-radius: 999px; padding: 14px 26px;
        font-weight: 700; font-size: 16px; cursor: pointer; font-family: inherit;
        transition: filter 0.2s, background 0.2s, transform 0.06s;
      }
      .btn:active { transform: translateY(1px); }
      .btn--primary { background: linear-gradient(90deg, var(--accent), var(--accent2)); color: #fff; box-shadow: 0 10px 34px -12px rgba(177,92,255,0.6); }
      .btn--primary:hover { filter: brightness(1.08); }
      .btn--ghost { background: transparent; color: var(--text); border-color: var(--border); }
      .btn--ghost:hover { background: var(--card); }
      .btn[disabled] { opacity: 0.4; cursor: default; }
      .links { display: flex; flex-direction: column; gap: 14px; align-items: center; margin-top: 36px; }
      .link {
        display: inline-block; text-decoration: none; font-weight: 700; font-size: 18px;
        padding: 14px 26px; border-radius: 999px; border: 1px solid var(--border); color: var(--text);
        min-width: 280px;
      }
      .link:hover { background: var(--card); border-color: var(--accent2); }
      .link span { font-weight: 400; color: var(--muted); display: block; font-size: 14px; margin-top: 2px; }
      .hint { color: var(--muted); font-size: 13px; text-align: center; padding-bottom: 24px; }
    </style>
  </head>
  <body>
    <div class="top">
      <div>toward<span class="grad">.love</span></div>
      <div class="count" id="count"></div>
    </div>

    <div class="stage">
      <div class="slide" id="slide"></div>
    </div>

    <div class="controls">
      <button class="btn btn--ghost" id="back">Back</button>
      <button class="btn btn--primary" id="next">Next</button>
    </div>
    <div class="hint">Use the buttons, arrow keys, or space to move.</div>

    <script>
      var QUESTIONS = [
        "What's a project or passion you've spent the most time on this year?",
        "What does that project reveal about what you actually value in life?",
        "What is something that happened in the last year that you're proud of?",
        "What is a part of your story that has shaped who you are today, but doesn't usually come up in first date conversation?",
        "What is one goal you have for the upcoming year?",
        "What is a dream you have for your future that feels almost too big or scary to say out loud?",
      ];
      var TOTAL = QUESTIONS.length + 1; // questions + closing slide
      var i = 0;

      var slide = document.getElementById("slide");
      var count = document.getElementById("count");
      var back = document.getElementById("back");
      var next = document.getElementById("next");

      function dots() {
        var s = '<div class="progress">';
        for (var d = 0; d < TOTAL; d++) {
          s += '<div class="dot' + (d === i ? " dot--on" : "") + '"></div>';
        }
        return s + "</div>";
      }

      function render() {
        var isLast = i === TOTAL - 1;
        if (!isLast) {
          slide.innerHTML =
            dots() +
            '<div class="kicker">Prompt ' + (i + 1) + " of " + QUESTIONS.length + "</div>" +
            '<h1 class="q">' + QUESTIONS[i] + "</h1>";
        } else {
          slide.innerHTML =
            dots() +
            '<div class="kicker">Keep going</div>' +
            '<h1 class="q">Thanks for sharing <span class="grad">toward love.</span></h1>' +
            '<div class="links">' +
            '<a class="link" href="https://app.toward.love">Join the community → app.toward.love<span>Your private member space</span></a>' +
            '<a class="link" href="https://toward.love/feedback">Share feedback → toward.love/feedback<span>Tell us what would make this better</span></a>' +
            "</div>";
        }
        count.textContent = i + 1 + " / " + TOTAL;
        back.disabled = i === 0;
        next.textContent = i >= TOTAL - 1 ? "Restart" : "Next";
      }

      function go(n) {
        i = (n + TOTAL) % TOTAL;
        render();
      }

      next.addEventListener("click", function () {
        if (i >= TOTAL - 1) go(0);
        else go(i + 1);
      });
      back.addEventListener("click", function () { if (i > 0) go(i - 1); });
      document.addEventListener("keydown", function (e) {
        if (e.key === "ArrowRight" || e.key === " ") { e.preventDefault(); next.click(); }
        else if (e.key === "ArrowLeft") { back.click(); }
      });

      render();
    </script>
  </body>
</html>

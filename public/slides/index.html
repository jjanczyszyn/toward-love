<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>toward.love · prompts</title>
    <meta name="robots" content="noindex" />
    <meta name="description" content="Conversation prompts from toward.love." />
    <style>
      :root {
        --bg: #0c0a10;
        --grad1: #1a0f1d;
        --text: #f3eef7;
        --muted: #a79fb3;
        --accent: #e5557a;
        --accent2: #b15cff;
        --card: #16131c;
        --border: #2a2533;
        color-scheme: dark;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        background: radial-gradient(1100px 600px at 50% -10%, var(--grad1), transparent 60%), var(--bg);
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        display: flex;
        flex-direction: column;
        min-height: 100%;
      }
      .grad {
        background: linear-gradient(90deg, var(--accent), var(--accent2));
        -webkit-background-clip: text; background-clip: text; color: transparent;
      }
      .top {
        display: flex; align-items: center; justify-content: space-between; gap: 12px;
        padding: 20px 24px; font-weight: 700; letter-spacing: 0.01em;
      }
      .top__right { display: flex; align-items: center; gap: 12px; }
      .count { color: var(--muted); font-weight: 600; font-size: 14px; }
      .iconbtn {
        background: transparent; border: 1px solid var(--border); color: var(--muted);
        border-radius: 999px; padding: 7px 14px; font-size: 13px; font-weight: 600;
        cursor: pointer; font-family: inherit;
      }
      .iconbtn:hover { color: var(--text); border-color: var(--accent2); }
      .stage {
        flex: 1; display: flex; align-items: center; justify-content: center;
        padding: 24px; text-align: center;
      }
      .slide { max-width: 840px; width: 100%; animation: fade 0.35s ease; }
      @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
      .kicker {
        text-transform: uppercase; letter-spacing: 0.14em; font-size: 13px;
        color: var(--muted); margin-bottom: 22px;
      }
      .q { font-size: clamp(28px, 5vw, 48px); line-height: 1.18; letter-spacing: -0.02em; margin: 0; }
      .agreements {
        list-style: none; padding: 0; margin: 26px auto 0; max-width: 640px; text-align: left;
        display: flex; flex-direction: column; gap: 14px; font-size: clamp(16px, 2.4vw, 20px);
      }
      .agreements li { position: relative; padding-left: 28px; line-height: 1.4; }
      .agreements li::before {
        content: "\2665"; position: absolute; left: 0; top: 0;
        background: linear-gradient(90deg, var(--accent), var(--accent2));
        -webkit-background-clip: text; background-clip: text; color: transparent;
      }
      .progress { display: flex; gap: 7px; justify-content: center; margin-bottom: 26px; flex-wrap: wrap; }
      .dot { width: 8px; height: 8px; border-radius: 999px; background: var(--border); transition: background 0.2s, transform 0.2s; }
      .dot--on { background: linear-gradient(90deg, var(--accent), var(--accent2)); transform: scale(1.3); }
      .controls {
        display: flex; align-items: center; justify-content: center; gap: 12px;
        padding: 0 24px 36px;
      }
      .btn {
        border: 1px solid transparent; border-radius: 999px; padding: 14px 26px;
        font-weight: 700; font-size: 16px; cursor: pointer; font-family: inherit;
        transition: filter 0.2s, background 0.2s, transform 0.06s;
      }
      .btn:active { transform: translateY(1px); }
      .btn--primary { background: linear-gradient(90deg, var(--accent), var(--accent2)); color: #fff; box-shadow: 0 10px 34px -12px rgba(177,92,255,0.6); }
      .btn--primary:hover { filter: brightness(1.08); }
      .btn--ghost { background: transparent; color: var(--text); border-color: var(--border); }
      .btn--ghost:hover { background: var(--card); }
      .btn[disabled] { opacity: 0.4; cursor: default; }
      .links { display: flex; flex-direction: column; gap: 14px; align-items: center; margin-top: 36px; }
      .link {
        display: inline-block; text-decoration: none; font-weight: 700; font-size: 18px;
        padding: 14px 26px; border-radius: 999px; border: 1px solid var(--border); color: var(--text);
        min-width: 280px;
      }
      .link:hover { background: var(--card); border-color: var(--accent2); }
      .link span { font-weight: 400; color: var(--muted); display: block; font-size: 14px; margin-top: 2px; }
      .hint { color: var(--muted); font-size: 13px; text-align: center; padding-bottom: 24px; }
    </style>
  </head>
  <body>
    <div class="top">
      <div>toward<span class="grad">.love</span></div>
      <div class="top__right">
        <button class="iconbtn" id="shuffle" title="Shuffle the prompts">&#10862; Shuffle</button>
        <button class="iconbtn" id="fs" title="Fullscreen (good for projecting)">&#9974; Fullscreen</button>
        <span class="count" id="count"></span>
      </div>
    </div>

    <div class="stage">
      <div class="slide" id="slide"></div>
    </div>

    <div class="controls">
      <button class="btn btn--ghost" id="back">Back</button>
      <button class="btn btn--primary" id="next">Next</button>
    </div>
    <div class="hint">Use the buttons, arrow keys, or space to move. Press F for fullscreen.</div>

    <script>
      var AGREEMENTS = [
        "Phones off",
        "Confidentiality: your story, not others'",
        'Speak from <b>"I"</b>',
        "Stay on prompt, avoid small talk. When uncomfortable, take a breath and notice the sensations in your body",
        "Full attention to your partner",
        "Take exquisitely good care of yourself: give yourself a breath before responding",
        '<b>At choice, always</b>: hands to heart + lean back = opt out',
        '<b>"No" is a complete answer</b>',
      ];

      var QUESTIONS = [
        // Warm-up
        "What's motivated you to come here tonight?",
        "What's something small that made you feel good this week?",
        "What's your favorite way to start your day?",
        "What's one thing that made you feel alive this week?",
        "What's a simple pleasure you'll never get tired of?",
        "What's one thing you're surprisingly good at?",
        "What's the best gift you've ever given?",
        "What's the most spontaneous thing you've done lately?",
        "What's one thing that's bringing you a lot of joy in your life right now?",
        "What's the best piece of advice you've ever actually followed?",
        "If you could master any new skill overnight, what would it be?",
        "What's a habit you've picked up recently that you're really loving?",
        "What's the best compliment you've ever received?",
        "What are you most curious about lately?",
        // Deeper
        "What's a project or passion you've spent the most time on this year?",
        "What does that project reveal about what you actually value in life?",
        "What is something that happened in the last year that you're proud of?",
        "What is a part of your story that has shaped who you are today, but doesn't usually come up in first date conversation?",
        "What is one goal you have for the upcoming year?",
        "What is a dream you have for your future that feels almost too big or scary to say out loud?",
      ];

      // Slides: [0] agreements, [1..N] questions, [last] closing.
      var TOTAL = QUESTIONS.length + 2;
      var i = 0;

      var slide = document.getElementById("slide");
      var count = document.getElementById("count");
      var back = document.getElementById("back");
      var next = document.getElementById("next");
      var fs = document.getElementById("fs");
      var shuffleBtn = document.getElementById("shuffle");

      function shuffle() {
        for (var k = QUESTIONS.length - 1; k > 0; k--) {
          var j = Math.floor(Math.random() * (k + 1));
          var t = QUESTIONS[k]; QUESTIONS[k] = QUESTIONS[j]; QUESTIONS[j] = t;
        }
      }

      function dots() {
        var s = '<div class="progress">';
        for (var d = 0; d < TOTAL; d++) {
          s += '<div class="dot' + (d === i ? " dot--on" : "") + '"></div>';
        }
        return s + "</div>";
      }

      function render() {
        if (i === 0) {
          slide.innerHTML =
            dots() +
            '<div class="kicker">Before we begin</div>' +
            '<h1 class="q">Agreements</h1>' +
            '<ul class="agreements">' +
            AGREEMENTS.map(function (a) { return "<li>" + a + "</li>"; }).join("") +
            "</ul>";
        } else if (i <= QUESTIONS.length) {
          slide.innerHTML =
            dots() +
            '<div class="kicker">Prompt ' + i + " of " + QUESTIONS.length + "</div>" +
            '<h1 class="q">' + QUESTIONS[i - 1] + "</h1>";
        } else {
          slide.innerHTML =
            dots() +
            '<div class="kicker">Keep going</div>' +
            '<h1 class="q">Thanks for sharing <span class="grad">toward love.</span></h1>' +
            '<div class="links">' +
            '<a class="link" href="https://app.toward.love">Join the community → app.toward.love<span>Your private member space</span></a>' +
            '<a class="link" href="https://toward.love/feedback">Share feedback → toward.love/feedback<span>Tell us what would make this better</span></a>' +
            "</div>";
        }
        count.textContent = i + 1 + " / " + TOTAL;
        back.disabled = i === 0;
        next.textContent = i >= TOTAL - 1 ? "Restart" : "Next";
      }

      function go(n) { i = (n + TOTAL) % TOTAL; render(); }

      next.addEventListener("click", function () {
        if (i >= TOTAL - 1) go(0);
        else go(i + 1);
      });
      back.addEventListener("click", function () { if (i > 0) go(i - 1); });

      function toggleFs() {
        var el = document.documentElement;
        if (!document.fullscreenElement) {
          (el.requestFullscreen || el.webkitRequestFullscreen || function () {}).call(el);
        } else {
          (document.exitFullscreen || document.webkitExitFullscreen || function () {}).call(document);
        }
      }
      fs.addEventListener("click", toggleFs);
      document.addEventListener("fullscreenchange", function () {
        fs.textContent = document.fullscreenElement ? "↡ Exit" : "⛎ Fullscreen";
      });
      shuffleBtn.addEventListener("click", function () { shuffle(); go(1); });

      document.addEventListener("keydown", function (e) {
        if (e.key === "ArrowRight" || e.key === " ") { e.preventDefault(); next.click(); }
        else if (e.key === "ArrowLeft") { back.click(); }
        else if (e.key === "f" || e.key === "F") { toggleFs(); }
      });

      render();
    </script>
  </body>
</html>
